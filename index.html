<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigatore Due Ruote</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 90vh; width: 100%; }
        .menu { height: 10vh; background: #2e7d32; color: white; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="menu">
        <b>Navigatore Bici & 50ini</b>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inizializza la mappa sulla posizione dell'utente (o una predefinita)
        var map = L.map('map').setView([45.4642, 9.1900], 13); // Esempio: Milano

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Funzione per trovare la posizione reale dell'utente
        map.locate({setView: true, maxZoom: 16});
        
        function onLocationFound(e) {
            L.marker(e.latlng).addTo(map).bindPopup("Sei qui!").openPopup();
        }
        map.on('locationfound', onLocationFound);
    </script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ... (tutto il codice della mappa che avete già messo) ...
    </script>

    <script>
        // Verifichiamo se il browser supporta i Service Worker
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('./sw.js').then(function(registration) {
              // Registrazione riuscita!
              console.log('ServiceWorker registrato con successo nell ambito: ', registration.scope);
            }, function(err) {
              // registrazione fallita :(
              console.log('Registrazione del ServiceWorker fallita: ', err);
            });
          });
        }
    </script>
</body>
</html>
